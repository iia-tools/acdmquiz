<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인천공항 A-CDM 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--surface:#151820;--surface2:#1c2030;
  --border:rgba(255,255,255,.07);--bh:rgba(255,255,255,.15);
  --text:#e8ecf4;--muted:#6b7280;--dim:#3d4451;
  --ac:#4f8ef7;--ac-d:rgba(79,142,247,.12);--ac-b:rgba(79,142,247,.35);
  --gr:#22c55e;--gr-d:rgba(34,197,94,.1);--gr-b:rgba(34,197,94,.3);
  --rd:#ef4444;--rd-d:rgba(239,68,68,.1);--rd-b:rgba(239,68,68,.3);
  --yl:#f59e0b;--yl-d:rgba(245,158,11,.1);--yl-b:rgba(245,158,11,.3);
  --pu:#a78bfa;--pu-d:rgba(167,139,250,.1);--pu-b:rgba(167,139,250,.3);
}
html{font-size:16px}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem 4rem}
body::before{content:'';position:fixed;top:-40%;left:-20%;width:70%;height:70%;
  background:radial-gradient(ellipse,rgba(79,142,247,.06) 0%,transparent 70%);pointer-events:none;z-index:0}
.app{position:relative;z-index:1;width:100%;max-width:680px}

/* Header */
.hdr{display:flex;align-items:center;justify-content:space-between;
  margin-bottom:2rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:var(--ac-d);border:1px solid var(--ac-b);
  border-radius:8px;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:16px;height:16px}
.logo-txt{font-size:13px;font-weight:500;color:var(--muted);letter-spacing:.05em;text-transform:uppercase}
.date-tag{font-family:'DM Mono',monospace;font-size:12px;color:var(--dim)}

/* Home */
#home{animation:ci .3s ease}
.h-title{font-size:22px;font-weight:500;margin-bottom:6px}
.h-sub{font-size:14px;color:var(--muted);margin-bottom:2rem;line-height:1.6}
.sec-lbl{font-family:'DM Mono',monospace;font-size:11px;color:var(--dim);
  letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}

.diff-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.75rem}
.dpill{padding:7px 16px;border-radius:999px;border:1px solid var(--border);
  background:var(--surface2);font-size:13px;color:var(--muted);cursor:pointer;
  transition:all .15s;font-family:'Noto Sans KR',sans-serif}
.dpill:hover{border-color:var(--bh);color:var(--text)}
.dpill.on{border-color:var(--ac-b);background:var(--ac-d);color:var(--ac)}
.dpill.easy.on{border-color:var(--gr-b);background:var(--gr-d);color:var(--gr)}
.dpill.hard.on{border-color:var(--yl-b);background:var(--yl-d);color:var(--yl)}
.dpill.expert.on{border-color:var(--pu-b);background:var(--pu-d);color:var(--pu)}

.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:8px;margin-bottom:1.75rem}
.ccard{background:var(--surface2);border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;cursor:pointer;transition:all .15s}
.ccard:hover{border-color:var(--bh)}
.ccard.on{border-color:var(--ac-b);background:var(--ac-d)}
.ccard.on .cname{color:var(--ac)}
.cname{font-size:13px;font-weight:500;color:var(--muted);margin-bottom:2px}
.ccnt{font-size:11px;color:var(--dim);font-family:'DM Mono',monospace}

.cnt-row{display:flex;align-items:center;gap:12px;margin-bottom:1.75rem;flex-wrap:wrap}
.cnt-btns{display:flex;gap:6px}
.cbtn{width:44px;height:34px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface2);font-size:13px;color:var(--muted);cursor:pointer;
  transition:all .15s;font-family:'DM Mono',monospace}
.cbtn:hover{border-color:var(--bh);color:var(--text)}
.cbtn.on{border-color:var(--ac-b);background:var(--ac-d);color:var(--ac)}

.start-btn{width:100%;padding:14px;border-radius:10px;background:var(--ac-d);
  border:1px solid var(--ac-b);font-size:15px;font-weight:500;color:var(--ac);
  cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s}
.start-btn:hover{background:rgba(79,142,247,.2)}
.avail{font-size:12px;color:var(--dim);text-align:center;margin-top:8px;font-family:'DM Mono',monospace}

/* Quiz */
#quiz{display:none}
.prog-wrap{margin-bottom:1.75rem}
.prog-meta{display:flex;justify-content:space-between;margin-bottom:8px}
.prog-lbl{font-size:12px;color:var(--muted)}
.prog-cnt{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted)}
.prog-bg{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--ac);border-radius:2px;transition:width .4s cubic-bezier(.4,0,.2,1)}

.dots{display:flex;gap:4px;margin-bottom:1.75rem;flex-wrap:wrap}
.dot{width:6px;height:6px;border-radius:50%;background:var(--surface2);transition:all .2s}
.dot.cur{background:var(--ac);transform:scale(1.4)}
.dot.ok{background:var(--gr)}
.dot.ng{background:var(--rd)}

.qcard{background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:1.75rem;margin-bottom:1rem;animation:ci .3s cubic-bezier(.4,0,.2,1)}
@keyframes ci{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.qmeta{display:flex;align-items:center;gap:8px;margin-bottom:1rem}
.qnum{font-family:'DM Mono',monospace;font-size:11px;color:var(--ac);letter-spacing:.08em}
.dbadge{font-size:10px;padding:2px 8px;border-radius:999px;font-family:'DM Mono',monospace}
.db-easy{background:var(--gr-d);border:1px solid var(--gr-b);color:var(--gr)}
.db-normal{background:var(--ac-d);border:1px solid var(--ac-b);color:var(--ac)}
.db-hard{background:var(--yl-d);border:1px solid var(--yl-b);color:var(--yl)}
.db-expert{background:var(--pu-d);border:1px solid var(--pu-b);color:var(--pu)}
.cbadge{font-size:10px;padding:2px 8px;border-radius:999px;background:var(--surface2);
  border:1px solid var(--border);color:var(--dim);font-family:'DM Mono',monospace}

.qtxt{font-size:16px;font-weight:500;line-height:1.75;color:var(--text);margin-bottom:1.5rem}
.opts{display:flex;flex-direction:column;gap:8px}
.obtn{background:var(--surface2);border:1px solid var(--border);border-radius:10px;
  padding:13px 16px;font-size:14px;font-family:'Noto Sans KR',sans-serif;color:var(--muted);
  cursor:pointer;text-align:left;line-height:1.5;transition:all .15s;
  display:flex;align-items:flex-start;gap:12px}
.oltr{font-family:'DM Mono',monospace;font-size:11px;color:var(--dim);min-width:16px;
  margin-top:2px;transition:color .15s}
.obtn:hover:not(:disabled){border-color:var(--bh);color:var(--text);background:rgba(255,255,255,.04)}
.obtn:hover:not(:disabled) .oltr{color:var(--ac)}
.obtn.ok{background:var(--gr-d);border-color:var(--gr-b);color:var(--gr)}
.obtn.ok .oltr{color:var(--gr)}
.obtn.ng{background:var(--rd-d);border-color:var(--rd-b);color:var(--rd)}
.obtn.ng .oltr{color:var(--rd)}
.obtn:disabled{cursor:default}

.feedback{margin-top:1.25rem;padding:14px 16px;background:var(--surface2);
  border-left:3px solid var(--ac);border-radius:0 8px 8px 0;font-size:13px;
  color:var(--muted);line-height:1.75;display:none;animation:fi .2s ease}
@keyframes fi{from{opacity:0}to{opacity:1}}
.feedback.show{display:block}
.fb-lbl{font-size:11px;color:var(--ac);font-weight:500;letter-spacing:.05em;
  text-transform:uppercase;margin-bottom:6px;font-family:'DM Mono',monospace}

.nav{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:1rem}
.nbtn{background:transparent;border:1px solid var(--border);border-radius:8px;
  padding:9px 20px;font-size:13px;font-family:'Noto Sans KR',sans-serif;
  color:var(--muted);cursor:pointer;transition:all .15s}
.nbtn:hover:not(:disabled){border-color:var(--bh);color:var(--text)}
.nbtn:disabled{opacity:.25;cursor:default}
.nbtn.pri{background:var(--ac-d);border-color:var(--ac-b);color:var(--ac)}
.nbtn.pri:hover:not(:disabled){background:rgba(79,142,247,.2)}
.nctr{font-size:12px;color:var(--dim)}

/* Result */
#result{display:none;animation:ci .4s ease}
#result.show{display:block}
.rtop{text-align:center;padding:2.5rem 1.75rem 2rem;background:var(--surface);
  border:1px solid var(--border);border-radius:16px;margin-bottom:1rem}
.remoji{font-size:44px;margin-bottom:1rem;display:block}
.rscore{font-family:'DM Mono',monospace;font-size:56px;color:var(--text);line-height:1}
.rdenom{font-family:'DM Mono',monospace;font-size:22px;color:var(--dim)}
.rpct{font-size:14px;color:var(--ac);font-family:'DM Mono',monospace;margin:6px 0 12px}
.rmsg{font-size:14px;color:var(--muted);line-height:1.7;max-width:360px;margin:0 auto 1.5rem}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.5rem}
.scard{background:var(--surface2);border-radius:10px;padding:12px;text-align:center}
.sval{font-family:'DM Mono',monospace;font-size:20px;margin-bottom:3px}
.slbl{font-size:11px;color:var(--dim)}
.sv-gr{color:var(--gr)}.sv-rd{color:var(--rd)}.sv-ac{color:var(--ac)}
.rbtns{display:flex;gap:8px}
.rbtn{flex:1;padding:11px;border-radius:10px;font-size:14px;
  font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .15s}
.rbtn.sec{background:transparent;border:1px solid var(--bh);color:var(--muted)}
.rbtn.sec:hover{color:var(--text);border-color:rgba(255,255,255,.25)}
.rbtn.pri{background:var(--ac-d);border:1px solid var(--ac-b);color:var(--ac)}
.rbtn.pri:hover{background:rgba(79,142,247,.2)}

.bk{margin-top:1rem;background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:1.25rem}
.bk-title{font-family:'DM Mono',monospace;font-size:11px;color:var(--dim);
  letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px}
.bk-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:13px}
.bk-lbl{width:70px;color:var(--muted)}
.bk-bg{flex:1;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
.bk-fill{height:100%;border-radius:2px;transition:width .6s ease}
.bk-val{font-family:'DM Mono',monospace;font-size:11px;color:var(--dim);min-width:44px;text-align:right}

.rev{margin-top:1rem}
.rev-title{font-family:'DM Mono',monospace;font-size:11px;color:var(--dim);
  letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px}
.rev-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;margin-bottom:6px;display:flex;align-items:flex-start;
  gap:10px;font-size:13px;line-height:1.6}
.rev-dot{width:7px;height:7px;border-radius:50%;margin-top:5px;flex-shrink:0;background:var(--rd)}
.rev-q{color:var(--muted);margin-bottom:3px}
.rev-a{font-size:12px;color:var(--ac)}

@media(max-width:480px){
  .qcard{padding:1.25rem}.rtop{padding:1.75rem 1.25rem 1.5rem}
  .sgrid{grid-template-columns:repeat(3,1fr)}.cat-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 16 16" fill="none">
          <path d="M8 2L13 5V11L8 14L3 11V5L8 2Z" stroke="#4f8ef7" stroke-width="1.2" fill="none"/>
          <circle cx="8" cy="8" r="1.5" fill="#4f8ef7"/>
        </svg>
      </div>
      <span class="logo-txt">A-CDM Quiz</span>
    </div>
    <span class="date-tag" id="dtag"></span>
  </div>

  <!-- Home -->
  <div id="home">
    <p class="h-title">인천공항 A-CDM 운영 퀴즈</p>
    <p class="h-sub">총 120문항 · 8개 주제 · 4단계 난이도<br>원하는 조건을 선택하고 퀴즈를 시작하세요.</p>

    <div class="sec-lbl">난이도</div>
    <div class="diff-row" id="diff-row">
      <button class="dpill on" data-v="all">전체</button>
      <button class="dpill easy" data-v="easy">초급</button>
      <button class="dpill" data-v="normal">중급</button>
      <button class="dpill hard" data-v="hard">고급</button>
      <button class="dpill expert" data-v="expert">전문</button>
    </div>

    <div class="sec-lbl">주제</div>
    <div class="cat-grid" id="cat-grid"></div>

    <div class="sec-lbl" style="margin-top:1.25rem">문제 수</div>
    <div class="cnt-row">
      <div class="cnt-btns" id="cnt-btns">
        <button class="cbtn" data-v="10">10</button>
        <button class="cbtn" data-v="20">20</button>
        <button class="cbtn on" data-v="30">30</button>
        <button class="cbtn" data-v="50">50</button>
        <button class="cbtn" data-v="9999">전체</button>
      </div>
    </div>

    <button class="start-btn" id="start-btn">퀴즈 시작하기</button>
    <p class="avail" id="avail"></p>
  </div>

  <!-- Quiz -->
  <div id="quiz">
    <div class="prog-wrap">
      <div class="prog-meta">
        <span class="prog-lbl">진행률</span>
        <span class="prog-cnt" id="prog-cnt">0 / 0</span>
      </div>
      <div class="prog-bg"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <div class="dots" id="dots"></div>
    <div id="qarea"></div>
    <div class="nav">
      <button class="nbtn" id="prev">← 이전</button>
      <span class="nctr" id="nctr"></span>
      <button class="nbtn pri" id="next">다음 →</button>
    </div>
  </div>

  <!-- Result -->
  <div id="result">
    <div class="rtop">
      <span class="remoji" id="remoji"></span>
      <div><span class="rscore" id="rscore"></span><span class="rdenom" id="rdenom"></span></div>
      <div class="rpct" id="rpct"></div>
      <p class="rmsg" id="rmsg"></p>
      <div class="sgrid">
        <div class="scard"><div class="sval sv-gr" id="s1"></div><div class="slbl">정답</div></div>
        <div class="scard"><div class="sval sv-rd" id="s2"></div><div class="slbl">오답</div></div>
        <div class="scard"><div class="sval sv-ac" id="s3"></div><div class="slbl">정확도</div></div>
      </div>
      <div class="rbtns">
        <button class="rbtn sec" id="home-btn">← 처음으로</button>
        <button class="rbtn pri" id="retry-btn">↺ 다시 풀기</button>
      </div>
    </div>
    <div id="bksec"></div>
    <div class="rev" id="revsec"></div>
  </div>
</div>

<script>
const ALL_Q = [
/* ── 용어정의 15 ── */
{c:'용어정의',d:'easy',q:"TOBT의 한국어 명칭은?",o:["목표 이륙시간","목표 주기장 출발시간","실제 주기장 출발시간","예상 주기장 출발시간"],a:1,e:"TOBT(Target Off Block Time)는 '목표 주기장 출발시간'으로, 항공기가 주기장에서 출발할 준비가 완료될 것으로 예상되는 목표시간입니다."},
{c:'용어정의',d:'easy',q:"AIBT의 한국어 명칭은?",o:["예상 주기장 도착시간","실제 주기장 도착시간","계획 주기장 도착시간","목표 주기장 도착시간"],a:1,e:"AIBT(Actual In Block Time)는 '실제 주기장 도착시간'으로 도착 항공기가 주기장에 실제 도착한 시간입니다."},
{c:'용어정의',d:'easy',q:"ATOT의 한국어 명칭은?",o:["예상 이륙시간","목표 이륙시간","실제 이륙시간","계획 이륙시간"],a:2,e:"ATOT(Actual Take Off Time)는 '실제 이륙시간'으로 출발 항공기가 활주로에서 실제 이륙한 시간입니다."},
{c:'용어정의',d:'easy',q:"EOBT의 한국어 명칭은?",o:["목표 주기장 출발시간","예상 주기장 출발시간","실제 주기장 출발시간","계획 주기장 출발시간"],a:1,e:"EOBT(Estimated Off Block Time)는 '예상 주기장 출발시간'으로 출발 항공기가 주기장에서 이동을 시작할 것으로 예상되는 시간입니다."},
{c:'용어정의',d:'easy',q:"TSAT의 한국어 명칭은?",o:["목표 이륙시간","실제 푸시백 승인시간","목표 푸시백 승인시간","예상 푸시백 승인시간"],a:2,e:"TSAT(Target Start Up Approval Time)은 '목표 푸시백 승인시간'으로 계류장관제소에서 항공기에게 푸시백 허가를 줄 것으로 예상되는 목표시간입니다."},
{c:'용어정의',d:'easy',q:"CTOT의 한국어 명칭은?",o:["예상 이륙시간","목표 이륙시간","조정이륙시간","실제 이륙시간"],a:2,e:"CTOT(Calculated Take Off Time)는 '조정이륙시간'으로 항공교통통제센터에서 항로 수용량을 고려하여 발부하는 이륙시간입니다."},
{c:'용어정의',d:'normal',q:"TTOT의 한국어 명칭은?",o:["실제 이륙시간","예상 이륙시간","목표 이륙시간","조정이륙시간"],a:2,e:"TTOT(Target Take Off Time)는 '목표 이륙시간'으로 관제탑에서 TOBT 및 CTOT, 교통상황 등을 고려하여 이륙시킬 것으로 예상되는 목표시간입니다."},
{c:'용어정의',d:'normal',q:"ELDT의 한국어 명칭은?",o:["실제 착륙시간","계획 착륙시간","예상 착륙시간","목표 착륙시간"],a:2,e:"ELDT(Estimated Landing Time)는 '예상 착륙시간'으로 도착 항공기가 활주로에 착륙할 것으로 예상되는 시간입니다."},
{c:'용어정의',d:'normal',q:"MTTT의 한국어 명칭은?",o:["최대 지상조업 소요시간","최소 지상조업 소요시간","평균 지상조업 소요시간","목표 지상조업 소요시간"],a:1,e:"MTTT(Minimum Turn-around Time)는 '최소 지상조업 소요시간'으로 도착 후 출발하는 운항편의 지상조업에 소요되는 최소 기준시간입니다."},

{c:'용어정의',d:'expert',q:"PDS의 한국어 명칭은?",o:["사전출발 정보시스템","출발시간 사전발부 운영절차","출발 관제 시스템","사전 비행계획 제출"],a:1,e:"PDS(Pre-Departure Sequencing)는 '출발시간 사전발부 운영절차'로 공항 및 공역의 운영상황을 반영한 최적의 주기장 출발시간을 산출하고 공유하는 절차입니다."},

{c:'절차',d:'hard',q:"항공교통통제센터는 CTOT를 어떤 경로로 공유하는가?",o:["관제탑을 통해","A-CDM 시스템(포털/모바일 APP)을 통해","AFTN 전문으로","계류장관제소를 통해"],a:1,e:"항공교통통제센터는 교통량 분산을 위해 CTOT를 발부할 수 있고 이를 A-CDM 시스템(포털/모바일 APP)을 통해 공유합니다."},
{c:'절차',d:'expert',q:"TSAT 파란색 변경 후 TOBT 수정 시 항공사가 주의해야 할 사항은?",o:["TSAT이 자동으로 재조정된다","TSAT 준수 불가 시 신속히 TOBT를 수정해 추가 지연을 방지해야 한다","TOBT 수정 시 자동으로 EOBT도 변경된다","수정 횟수에 제한이 없다"],a:1,e:"TSAT 및 TTOT가 파란색인 경우 이륙순서가 정해진 것이므로, 항공사가 TSAT을 준수할 수 없는 경우에는 신속하게 TOBT를 수정하여 추가 지연이 발생하지 않도록 관리해야 합니다."},
{c:'절차',d:'expert',q:"A-CDM 1단계 운영 기간은?",o:["2015.06 ~ 2017.12","2017.12 ~ 2025.09","2020.01 ~ 2025.09","2019.12 ~ 2025.09"],a:1,e:"A-CDM 1단계 운영은 2017년 12월부터 2025년 9월까지로, 기본 시간정보 공유 및 시스템 안정화를 추진합니다."},
{c:'절차',d:'expert',q:"A-CDM 3단계 운영 목표는?",o:["DMAN 고도화","제방빙 정보 공유 확대","TAM 연계 및 PBAM 적용을 통한 통합적 공항운영관리","모바일 APP 고도화"],a:2,e:"3단계 운영(2030.01~)은 TAM(Total Airport Management) 연계 및 PBAM 등 미래공항 운영 Concept 적용을 통한 통합적 공항운영관리를 추진합니다."},
{c:'절차',d:'expert',q:"관제탑 TSAT 발부 후 조종사의 PUSHBACK 요청 허용 범위는?",o:["TSAT ±3분 이내","TSAT ±5분 이내","TSAT -5분 ~ +10분 이내","TSAT ±10분 이내"],a:1,e:"관제탑에서 TSAT을 받은 조종사는 TSAT ±5분 사이에 계류장관제소에 교신하여 엔진시동 및 푸시백을 요청해야 합니다."},
{c:'절차',d:'expert',q:"모바일 APP 최초 로그인 후 패스워드 규정은?",o:["90일마다 변경 필수","최초 로그인 이후 패스워드를 변경해야 한다","6개월 이내 변경","변경 의무 없음"],a:1,e:"모바일 APP은 정상적으로 계정이 승인되면 신청한 휴대전화로 초기 패스워드가 전송되며, 최초 로그인 이후 패스워드를 변경해야 합니다."},
/* ── 시스템 10 ── */
{c:'시스템',d:'easy',q:"A-CDM 포털시스템은 무엇의 한 모듈인가?",o:["ATFMS","IIS(통합정보시스템)","DMAN","FIA"],a:1,e:"A-CDM 포털시스템은 IIS(통합정보시스템)의 한 모듈로, 인천공항 출발 및 도착에 이르는 항공기 이동시간 정보를 협업기관과 공유하는 시스템입니다."},
{c:'시스템',d:'easy',q:"DMAN의 한국어 명칭은?",o:["도착관리시스템","출발관리시스템","항공교통흐름관리시스템","카운터안내시스템"],a:1,e:"DMAN(Departure Manager)은 '출발관리시스템'으로 여러 제한 조건과 우선권을 고려하여 출발 항공기에게 TTOT와 TSAT을 산출하는 시스템입니다."},
{c:'시스템',d:'easy',q:"FIA의 한국어 명칭은?",o:["비행정보시스템","카운터안내시스템","게이트운영시스템","출발관리시스템"],a:1,e:"FIA(Flight Information Assistant)는 '카운터안내시스템'으로 게이트 입구에서 항공사 및 조업사가 게이트 오픈, 승객탑승, Final Call 등을 입력하는 시스템입니다."},
{c:'시스템',d:'normal',q:"ATFMS의 역할로 올바른 것은?",o:["TOBT를 산출하여 항공사에 제공","CTOT와 FIR 시간정보를 제공","주기장을 배정하고 조정","제방빙 정보를 관리"],a:1,e:"ATFMS(항공교통흐름관리시스템)는 항공교통통제센터에서 사용하는 시스템으로 CTOT와 FIR 시간정보를 제공합니다."},
{c:'시스템',d:'normal',q:"자동갱신(Refresh Term) 주기 옵션이 아닌 것은?",o:["30초","1분","2분","5분"],a:2,e:"A-CDM 포털의 자동갱신 주기는 Not Term, 30초, 1분, 3분, 5분으로 설정할 수 있습니다. 2분 옵션은 없습니다."},
{c:'시스템',d:'normal',q:"A-CDM 운항편 상태 중 'RDY'의 의미는?",o:["승객 보딩","도어 닫힘","항공기 준비완료 (PBB 이현시)","주기장 출발"],a:2,e:"'RDY'는 항공기 준비완료 상태로, PBB(탑승교)가 이현될 때 부여되는 상태입니다."},
{c:'시스템',d:'normal',q:"ACDM007 알람 발생 조건은?",o:["ATC 비행계획이 없는 경우","EIBT+MTTT가 TOBT+5분 보다 클 경우","주기장 복귀 시","TOBT가 EOBT와 15분 초과 차이 날 경우"],a:1,e:"ACDM007은 EIBT+MTTT가 TOBT+5분 보다 클 경우 발생하며, 출발 항공기 SOBT 확인 및 EOBT/TOBT 수정을 안내합니다."},
{c:'시스템',d:'hard',q:"A-CDM 시스템과 연계되지 않는 것은?",o:["DMAN","A-SMGCS","VDGS","ACARS"],a:3,e:"A-CDM은 DMAN, A-SMGCS, VDGS, FIA, ATFMS, IIS 등과 연계됩니다. ACARS는 A-CDM 연계 시스템으로 명시되지 않았습니다."},
{c:'시스템',d:'hard',q:"ACDM034 알람 발생 상황과 대응은?",o:["CTOT 오류 - ATCC에 연락","TSAT 취소 - TOBT 재입력","주기장 복귀 - EOBT 수정","비행계획서 불일치 - 비행계획 수정"],a:2,e:"ACDM034는 주기장 복귀 시 발생하며, '출발 항공기가 주기장으로 복귀하였습니다. EOBT를 수정하십시오.'라고 안내합니다."},
{c:'시스템',d:'expert',q:"ACDM040 알람 발생 상황은?",o:["EEZT +5분까지 AEZT 미입력","관제탑에서 TOBT 삭제","ARTS와 IIS의 EOBT가 15분 이상 차이","CTOT 반영 TSAT이 TOBT보다 작은 경우"],a:2,e:"ACDM040은 ARTS와 IIS의 EOBT가 15분 이상 차이 날 경우 발생하며, 30분 이상 차이 날 경우 TSAT 발부 대상에서 제외될 수 있으니 AFTN을 통해 EOBT를 수정하라고 안내합니다."},
/* ── 제방빙 15 ── */
{c:'제방빙',d:'easy',q:"제방빙 작업의 목적은?",o:["항공기 연료 절약","항공기 표면의 서리, 얼음, 눈을 제거하여 안전 확보","항공기 엔진 예열","항공기 외부 점검"],a:1,e:"제방빙 작업은 출발항공기의 안전을 위하여 항공기 표면의 중요 위치에 쌓이거나 발생한 서리 및 얼음, 눈을 제거하기 위한 작업입니다."},
{c:'제방빙',d:'easy',q:"APIT의 한국어 명칭은?",o:["실제 제방빙장 진출시간","예상 제방빙장 진입시간","실제 제방빙장 진입시간","실제 제방빙작업 시작시간"],a:2,e:"APIT(Actual de-icing Pad In Time)는 '실제 제방빙장 진입시간'으로 제방빙 항공기가 사전 배정된 제방빙장에 실제 접근하는 진입시간입니다."},
{c:'제방빙',d:'easy',q:"제방빙 작업은 어디에서 이루어지는가?",o:["항공기 주기장에서","활주로 유도로에서","제방빙 시설이 준비된 지정된 장소에서","터미널 앞 에이프런에서"],a:2,e:"제방빙 작업은 제방빙 시설이 준비된 지정된 장소(제방빙장)에서 이루어집니다."},
{c:'제방빙',d:'normal',q:"EPIT와 EPOT가 최초로 자동 생성되는 시점은?",o:["TOBT 입력 시","제방빙 작업 시작 시","제방빙존과 패드를 배정함과 동시에","항공기 주기장 도착 시"],a:2,e:"EPIT와 EPOT는 제방빙존을 배정함과 동시에 최초로 자동 생성됩니다."},
{c:'제방빙',d:'normal',q:"제방빙 신청 방법은?",o:["관제탑에 무선으로 요청","시스템(포털/모바일 APP)을 통하거나 조종사가 계류장관제소에 요청","A-CDM 운영소에 전화로 요청","지상조업사에 직접 요청"],a:1,e:"항공사 또는 지상조업사는 시스템(포털/모바일 APP)을 통해 제방빙 작업을 요청하거나, 조종사가 계류장관제소에 제방빙 작업을 요청할 수 있습니다."},
{c:'제방빙',d:'normal',q:"제방빙 항공기가 포털 시스템에서 표시되는 방법은?",o:["항공편명 우측에 눈모양 아이콘","항공편명 좌측 칼럼에 눈모양 아이콘","편명이 파란색으로 표시","별도 탭으로 분리"],a:1,e:"제방빙 항공기는 항공기 편명의 왼쪽 칼럼에 눈모양 아이콘이 표시됩니다."},
{c:'제방빙',d:'normal',q:"AEZT의 한국어 명칭은?",o:["예상 제방빙작업 종료시간","실제 제방빙작업 종료시간","실제 제방빙작업 시작시간","예상 제방빙작업 시작시간"],a:1,e:"AEZT(Actual End of De-icing Time)는 '실제 제방빙작업 종료시간'으로 제방빙장에서 항공기에게 제방빙 용액을 살포 완료 및 점검을 종료한 시간입니다."},
{c:'제방빙',d:'hard',q:"ADIT는 어떻게 산출되는가?",o:["AEZT - APIT","AEZT - ACZT","APOT - APIT","ECZT - ACZT"],a:1,e:"ADIT(Actual De-icing Time, 실제 제방빙작업 소요시간)는 AEZT - ACZT로 산출됩니다."},
{c:'제방빙',d:'hard',q:"EPOT는 최초 어떻게 계산되는가?",o:["EPIT + EDIT","EPIT + EDIT + 기타시간의 합","EEZT + 기타시간","APIT + EDIT"],a:1,e:"최초 계산되는 EPOT는 EPIT·EDIT·기타시간의 합으로 산출되며, 이후 APIT 발생에 따라 갱신됩니다."},
{c:'제방빙',d:'hard',q:"APIT 발생에 따라 갱신되는 시간정보는?",o:["EPIT","EPOT","EEZT","EDIT"],a:1,e:"APIT 발생에 따라 EPOT가 갱신되며, 관제탑은 갱신된 EPOT를 활용하여 비행허가 발부 및 TTOT 업데이트에 활용합니다."},
{c:'제방빙',d:'hard',q:"제방빙 시 ACZT와 AEZT를 입력하는 기관은?",o:["계류장관제소","지상조업사(ICE-HOUSE)","관제탑","A-CDM 운영소"],a:1,e:"ACZT(실제 제방빙작업 시작시간) 및 AEZT(실제 제방빙작업 종료시간)는 지상조업사(ICE-HOUSE)에서 제공합니다."},
{c:'제방빙',d:'hard',q:"EEZT 준수 어려울 경우 수정에 사용하는 시스템은?",o:["A-CDM 포털","모바일 APP","IIS(통합정보시스템)","FIA 시스템"],a:2,e:"제방빙 용액 보충 또는 기타 사유로 EEZT 준수가 어려울 경우, 항공사 또는 지상조업사는 IIS(통합정보시스템)을 사용하여 EEZT를 수정합니다."},
{c:'제방빙',d:'expert',q:"제방빙 신청 항공기 주기장 복귀 후 재신청 절차는?",o:["기존 제방빙 신청 정보를 수정하여 재사용한다","기존 정보는 과거자료로 남고 2.4.1.1 절차를 처음부터 따른다","A-CDM 운영소에 요청한다","계류장관제소에만 재요청하면 된다"],a:1,e:"제방빙을 신청한 항공기가 주기장 복귀 후 제방빙을 다시 요청해야할 경우 기존 제방빙 신청 정보는 과거 자료로 남게 되므로 2.4.1.1의 일반 제방빙 절차를 처음부터 따릅니다."},
{c:'제방빙',d:'expert',q:"제방빙 패드 배정 정보를 확인할 수 있는 시스템은?",o:["A-CDM 포털 공지사항","IIS 에어사이드 관제 메뉴 Deicing Information","DMAN 시스템","모바일 APP 전체메뉴"],a:1,e:"제방빙존 배정 정보는 통합정보시스템 IIS의 에어사이드 관제 메뉴의 Deicing Information에서 확인할 수 있습니다."},
{c:'제방빙',d:'expert',q:"제방빙 시 DMAN이 산출하는 정보는?",o:["EPIT와 EPOT만","APIT와 APOT","제방빙패드·EPIT·EPOT를 활용하여 제방빙작업을 고려한 TTOT/TSAT","ACZT와 AEZT"],a:2,e:"DMAN(출발관리시스템)은 제방빙패드, EPIT, EPOT를 활용하여 제방빙작업을 고려한 TTOT/TSAT을 산출합니다."},
/* ── 비상절차 10 ── */
{c:'비상절차',d:'easy',q:"A-CDM 포털 완전 중단 시 항공사·조업사가 따르는 절차는?",o:["TSAT 기준으로 계속 운영","Non A-CDM 절차","계류장관제소에서 수동 관제","A-CDM 운영소 지시에 따름"],a:1,e:"A-CDM 포털 서비스 불가 시, 항공사 및 조업사는 Non A-CDM 절차에 따라 TOBT 입력 없이 ETD(EOBT)에 맞게 준비하고, 지연 시 ETD(EOBT)를 수정하여 출발준비를 합니다."},
{c:'비상절차',d:'easy',q:"Non A-CDM 절차 시 조종사는 어떤 절차를 따르는가?",o:["임의로 출발한다","관제탑 지시만 따른다","인천공항 AIP의 출발절차를 따른다","TSAT을 기다린다"],a:2,e:"A-CDM 포털 시스템 불가 시 조종사는 인천공항 AIP의 출발절차를 따릅니다."},
{c:'비상절차',d:'normal',q:"모바일 A-CDM 자체 시스템 장애 시(A-CDM 포털은 정상) 취해야 할 조치는?",o:["Non A-CDM 절차 따름","정상적인 A-CDM 운영절차를 따른다","모든 출발을 중단한다","A-CDM 운영소에 신고"],a:1,e:"모바일 A-CDM 자체 시스템 장애 시 A-CDM 포털은 운영 중이므로, 정상적인 A-CDM 운영절차를 따릅니다."},
{c:'비상절차',d:'normal',q:"관제기관 장비 또는 인터페이스 장애 시, 주기장 VDGS에 표출되는 것은?",o:["TSAT만","TTOT만","TOBT만","TOBT와 TSAT"],a:2,e:"관제기관 장비 또는 인터페이스 장애 시 관제탑에서 생산되는 TSAT과 TTOT는 제공되지 않고 주기장의 VDGS에는 TOBT만 표출됩니다."},
{c:'비상절차',d:'normal',q:"항공교통통제센터와 인터페이스 장애 시 A-CDM으로 제공되지 않는 정보는?",o:["TOBT","TSAT","CTOT","EOBT"],a:2,e:"항공교통통제센터와 인터페이스 장애 시 A-CDM 시스템(포털/모바일 APP)으로는 항공교통통제센터의 CTOT가 제공되지 않습니다."},
{c:'비상절차',d:'normal',q:"게이트 FIA 장애 시 TOBT를 어떻게 입력하는가?",o:["계류장관제소에 구두 통보","A-CDM 시스템(포털/모바일 APP)에 TOBT를 입력","관제탑에 무선으로 통보","TOBT 입력을 포기하고 EOBT만 관리"],a:1,e:"게이트의 FIA 장애 시 게이트에서 TOBT를 입력할 수 없으므로 항공사 또는 조업사는 A-CDM 시스템(포털/모바일 APP)에 TOBT를 입력합니다."},
{c:'비상절차',d:'hard',q:"비정상상황 대량지연의 기준으로 맞는 것은?",o:["악기상으로 이륙 중단 30분 이상 지속","악기상으로 이륙 중단 1시간 이상 지속(심야·비혼잡시간 제외)","ATFM 제한으로 모든 CTOT 발부 중단","활주로 1개 이상 폐쇄"],a:1,e:"비정상상황으로 인한 대량지연은 저시정 등 악기상에 의해 이륙 중단이 1시간 이상 지속(심야시간 및 비혼잡시간 제외)되어 공항이 혼잡하며 대량지연이 발생하는 경우 등을 말합니다."},
{c:'비상절차',d:'hard',q:"대량지연 발생 시 관제탑이 A-CDM 운영소에 제공하는 것은?",o:["사전도착리스트","사전출발리스트","지연현황 통계","기상 예보"],a:1,e:"대량지연 발생 시 관제탑은 사전출발리스트 산출 가능 여부와 필요성을 판단하고, 필요시 사전출발리스트를 생산하여 A-CDM 운영소에 제공합니다."},
{c:'비상절차',d:'expert',q:"사용자 운영 환경 제한 시, 계류장관리소에 요청할 수 있는 것은?",o:["TSAT 임시 발부","유선으로 EOBT 수정 요청","TOBT 일괄 입력 대행","긴급 주기장 배정"],a:1,e:"사용자 운영 환경으로 인한 시스템 제한 시, FIA에 TOBT를 입력하고 필요시 계류장관리소에 유선으로 EOBT 수정을 요청하여 협업기관과 TOBT 정보를 최대한 공유토록 합니다."},
{c:'비상절차',d:'expert',q:"대량지연 발생 시 A-CDM 운영소가 출발리스트를 공유하는 방법은?",o:["SMS 발송","A-CDM 시스템(포털/모바일 APP) 공지사항을 통해","이메일 발송","관제탑 방송을 통해"],a:1,e:"A-CDM 운영소는 관제탑으로부터 제공된 출발리스트를 A-CDM 시스템(포털/모바일 APP) 공지사항을 통하여 공유합니다."},
];

const CATS = [...new Set(ALL_Q.map(q=>q.c))];
const DIFFS = ['easy','normal','hard','expert'];
const DL = {easy:'초급',normal:'중급',hard:'고급',expert:'전문'};
const DC = {easy:'var(--gr)',normal:'var(--ac)',hard:'var(--yl)',expert:'var(--pu)'};
const LT = ['A','B','C','D'];

let S = {diff:'all', cats:new Set(CATS), cnt:30, pool:[], cur:0, ans:[], score:0};

function boot(){
  const d=new Date(), p=n=>String(n).padStart(2,'0');
  document.getElementById('dtag').textContent=`${d.getFullYear()}.${p(d.getMonth()+1)}.${p(d.getDate())}`;
  buildCats(); bindDiff(); bindCnt(); updAvail();
  document.getElementById('start-btn').addEventListener('click',startQuiz);
}

function buildCats(){
  const el=document.getElementById('cat-grid');
  CATS.forEach(cat=>{
    const n=ALL_Q.filter(q=>q.c===cat).length;
    const d=document.createElement('div');
    d.className='ccard on'; d.dataset.cat=cat;
    d.innerHTML=`<div class="cname">${cat}</div><div class="ccnt">${n}문항</div>`;
    d.addEventListener('click',()=>{
      if(S.cats.has(cat)&&S.cats.size===1) return;
      if(S.cats.has(cat)){S.cats.delete(cat);d.classList.remove('on');}
      else{S.cats.add(cat);d.classList.add('on');}
      updAvail();
    });
    el.appendChild(d);
  });
}

function bindDiff(){
  document.getElementById('diff-row').querySelectorAll('.dpill').forEach(b=>{
    b.addEventListener('click',()=>{
      document.querySelectorAll('.dpill').forEach(x=>x.classList.remove('on'));
      b.classList.add('on'); S.diff=b.dataset.v; updAvail();
    });
  });
}

function bindCnt(){
  document.getElementById('cnt-btns').querySelectorAll('.cbtn').forEach(b=>{
    b.addEventListener('click',()=>{
      document.querySelectorAll('.cbtn').forEach(x=>x.classList.remove('on'));
      b.classList.add('on'); S.cnt=parseInt(b.dataset.v); updAvail();
    });
  });
}

function filtered(){
  return ALL_Q.filter(q=>(S.diff==='all'||q.d===S.diff)&&S.cats.has(q.c));
}

function updAvail(){
  const f=filtered(), t=Math.min(S.cnt,f.length);
  document.getElementById('avail').textContent=`선택된 문제: ${f.length}개 중 ${t}개 출제`;
}

function shuffle(a){
  const r=[...a];
  for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}
  return r;
}

function startQuiz(){
  const f=shuffle(filtered());
  const t=Math.min(S.cnt===9999?f.length:S.cnt,f.length);
  S.pool=f.slice(0,t); S.cur=0; S.ans=new Array(t).fill(null); S.score=0;
  document.getElementById('home').style.display='none';
  document.getElementById('result').classList.remove('show');
  document.getElementById('quiz').style.display='';
  rdots(); rprog(); rq();
}

function rdots(){
  const el=document.getElementById('dots'); el.innerHTML='';
  S.ans.forEach((a,i)=>{
    const d=document.createElement('div'); d.className='dot';
    if(a===true) d.classList.add('ok');
    else if(a===false) d.classList.add('ng');
    else if(i===S.cur) d.classList.add('cur');
    el.appendChild(d);
  });
}

function rprog(){
  const done=S.ans.filter(a=>a!==null).length, tot=S.pool.length;
  document.getElementById('prog-fill').style.width=Math.round(done/tot*100)+'%';
  document.getElementById('prog-cnt').textContent=done+' / '+tot;
}

function rq(){
  const q=S.pool[S.cur], isAns=S.ans[S.cur]!==null;
  document.getElementById('qarea').innerHTML=`
    <div class="qcard">
      <div class="qmeta">
        <span class="qnum">Q${S.cur+1} / ${S.pool.length}</span>
        <span class="dbadge db-${q.d}">${DL[q.d]}</span>
        <span class="cbadge">${q.c}</span>
      </div>
      <p class="qtxt">${q.q}</p>
      <div class="opts" id="opts"></div>
      <div class="feedback${isAns?' show':''}" id="fb">
        <div class="fb-lbl">해설</div>${q.e}
      </div>
    </div>`;
  const opts=document.getElementById('opts');
  q.o.forEach((o,i)=>{
    const b=document.createElement('button');
    b.className='obtn';
    b.innerHTML=`<span class="oltr">${LT[i]}</span><span>${o}</span>`;
    b.disabled=isAns;
    if(isAns){
      if(i===q.a) b.classList.add('ok');
      if(S.ans[S.cur]===false&&i!==q.a) b.classList.add('ng');
    }
    b.addEventListener('click',()=>pick(i));
    opts.appendChild(b);
  });
  const prev=document.getElementById('prev'), next=document.getElementById('next'), nc=document.getElementById('nctr');
  prev.disabled=S.cur===0;
  prev.onclick=()=>{S.cur--;rdots();rprog();rq();};
  const last=S.cur===S.pool.length-1, all=S.ans.every(a=>a!==null);
  next.textContent=last?'결과 보기 →':'다음 →';
  next.disabled=last&&!all;
  nc.textContent=last&&!all?'모든 문제를 풀어주세요':'';
  next.onclick=()=>{if(last)showResult();else{S.cur++;rdots();rprog();rq();}};
}

function pick(i){
  const q=S.pool[S.cur], ok=i===q.a;
  S.ans[S.cur]=ok; if(ok) S.score++;
  document.querySelectorAll('.obtn').forEach((b,j)=>{
    b.disabled=true;
    if(j===q.a) b.classList.add('ok');
    if(!ok&&j===i) b.classList.add('ng');
  });
  document.getElementById('fb').classList.add('show');
  const last=S.cur===S.pool.length-1, all=S.ans.every(a=>a!==null);
  if(last){document.getElementById('next').disabled=!all;document.getElementById('nctr').textContent=all?'':'모든 문제를 풀어주세요';}
  rdots(); rprog();
}

function showResult(){
  document.getElementById('quiz').style.display='none';
  const rs=document.getElementById('result'); rs.classList.add('show');
  const tot=S.pool.length, ok=S.score, ng=S.ans.filter(a=>a===false).length;
  const pct=Math.round(ok/tot*100);
  const ei=['😅','🤔','👍','🎯','🏆'][Math.min(Math.floor(pct/20),4)];
  document.getElementById('remoji').textContent=ei;
  document.getElementById('rscore').textContent=ok;
  document.getElementById('rdenom').textContent=' / '+tot;
  document.getElementById('rpct').textContent='정답률 '+pct+'%';
  document.getElementById('rmsg').textContent=['A-CDM 매뉴얼을 처음부터 다시 읽어보면 도움이 됩니다.','기초는 잡혔어요. 조금 더 복습해봅시다.','꽤 알고 있군요! 오답을 중심으로 보강해보세요.','훌륭해요! 거의 전문가 수준입니다.','완벽합니다! A-CDM 전문가시네요.'][Math.min(Math.floor(pct/20),4)];
  document.getElementById('s1').textContent=ok;
  document.getElementById('s2').textContent=ng;
  document.getElementById('s3').textContent=pct+'%';

  // Breakdown
  const bk=document.getElementById('bksec');
  const ds={};DIFFS.forEach(d=>ds[d]={ok:0,tot:0});
  S.pool.forEach((q,i)=>{ds[q.d].tot++;if(S.ans[i]===true)ds[q.d].ok++;});
  const multi=DIFFS.filter(d=>ds[d].tot>0).length>1;
  if(multi){
    let h='<div class="bk"><div class="bk-title">난이도별 성적</div>';
    DIFFS.forEach(d=>{
      if(!ds[d].tot) return;
      const p=Math.round(ds[d].ok/ds[d].tot*100);
      h+=`<div class="bk-row"><span class="bk-lbl">${DL[d]}</span>
        <div class="bk-bg"><div class="bk-fill" style="width:${p}%;background:${DC[d]}"></div></div>
        <span class="bk-val">${ds[d].ok}/${ds[d].tot}</span></div>`;
    });
    bk.innerHTML=h+'</div>';
  } else bk.innerHTML='';

  // Wrong review
  const rv=document.getElementById('revsec');
  const wrongs=S.ans.map((a,i)=>({a,i})).filter(x=>x.a===false);
  if(wrongs.length){
    let h=`<div class="rev-title">오답 목록 (${wrongs.length}개)</div>`;
    wrongs.forEach(({i})=>{
      const q=S.pool[i];
      h+=`<div class="rev-item"><div class="rev-dot"></div><div>
        <div class="rev-q">${q.q}</div>
        <div class="rev-a">정답: ${q.o[q.a]}</div>
      </div></div>`;
    });
    rv.innerHTML=h;
  } else rv.innerHTML='';

  document.getElementById('home-btn').onclick=()=>{
    rs.classList.remove('show');
    document.getElementById('home').style.display='';
    updAvail();
  };
  document.getElementById('retry-btn').onclick=()=>{rs.classList.remove('show');startQuiz();};
}

boot();
</script>
</body>
</html>
