<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인천공항 A-CDM 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --surface: #151820;
    --surface2: #1c2030;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.15);
    --text: #e8ecf4;
    --text-muted: #6b7280;
    --text-dim: #3d4451;
    --accent: #4f8ef7;
    --accent-dim: rgba(79,142,247,0.12);
    --accent-border: rgba(79,142,247,0.35);
    --green: #22c55e;
    --green-dim: rgba(34,197,94,0.1);
    --green-border: rgba(34,197,94,0.3);
    --red: #ef4444;
    --red-dim: rgba(239,68,68,0.1);
    --red-border: rgba(239,68,68,0.3);
    --yellow: #f59e0b;
  }

  html { font-size: 16px; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  body::before {
    content: '';
    position: fixed;
    top: -40%;
    left: -20%;
    width: 70%;
    height: 70%;
    background: radial-gradient(ellipse, rgba(79,142,247,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 640px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
    padding-bottom: 1.25rem;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: var(--accent-dim);
    border: 1px solid var(--accent-border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-icon svg { width: 16px; height: 16px; }

  .logo-text {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .date-tag {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.03em;
  }

  /* Progress bar */
  .progress-wrap {
    margin-bottom: 1.75rem;
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .progress-label {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 400;
  }

  .progress-count {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
  }

  .progress-bar-bg {
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Dots */
  .dots {
    display: flex;
    gap: 5px;
    margin-bottom: 1.75rem;
    flex-wrap: wrap;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--surface2);
    transition: all 0.2s ease;
  }

  .dot.current { background: var(--accent); transform: scale(1.3); }
  .dot.correct { background: var(--green); }
  .dot.wrong { background: var(--red); }

  /* Question card */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.75rem;
    margin-bottom: 1rem;
    animation: cardIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .q-tag::before {
    content: '';
    display: inline-block;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--accent);
  }

  .q-text {
    font-size: 16px;
    font-weight: 500;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 1.5rem;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .opt-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text-muted);
    cursor: pointer;
    text-align: left;
    line-height: 1.5;
    transition: all 0.15s ease;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .opt-letter {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    min-width: 16px;
    margin-top: 2px;
    transition: color 0.15s;
  }

  .opt-btn:hover:not(:disabled) {
    border-color: var(--border-hover);
    color: var(--text);
    background: rgba(255,255,255,0.04);
  }

  .opt-btn:hover:not(:disabled) .opt-letter { color: var(--accent); }

  .opt-btn.correct {
    background: var(--green-dim);
    border-color: var(--green-border);
    color: var(--green);
  }

  .opt-btn.correct .opt-letter { color: var(--green); }

  .opt-btn.wrong {
    background: var(--red-dim);
    border-color: var(--red-border);
    color: var(--red);
  }

  .opt-btn.wrong .opt-letter { color: var(--red); }

  .opt-btn:disabled { cursor: default; }

  /* Feedback */
  .feedback {
    margin-top: 1.25rem;
    padding: 14px 16px;
    background: var(--surface2);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.7;
    display: none;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .feedback.show { display: block; }

  .feedback-label {
    font-size: 11px;
    color: var(--accent);
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 6px;
    font-family: 'DM Mono', monospace;
  }

  /* Navigation */
  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    margin-top: 1rem;
  }

  .nav-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 20px;
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .nav-btn:hover:not(:disabled) {
    border-color: var(--border-hover);
    color: var(--text);
  }

  .nav-btn:disabled { opacity: 0.25; cursor: default; }

  .nav-btn.primary {
    background: var(--accent-dim);
    border-color: var(--accent-border);
    color: var(--accent);
  }

  .nav-btn.primary:hover:not(:disabled) {
    background: rgba(79,142,247,0.2);
  }

  .skip-info {
    font-size: 12px;
    color: var(--text-dim);
  }

  /* Result screen */
  .result-screen {
    display: none;
    animation: cardIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .result-screen.show { display: block; }

  .result-top {
    text-align: center;
    padding: 2.5rem 1.75rem 2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 1rem;
  }

  .result-emoji {
    font-size: 40px;
    margin-bottom: 1rem;
    display: block;
  }

  .result-score-wrap {
    margin-bottom: 0.5rem;
  }

  .result-score {
    font-family: 'DM Mono', monospace;
    font-size: 52px;
    font-weight: 400;
    color: var(--text);
    line-height: 1;
  }

  .result-denom {
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    color: var(--text-dim);
  }

  .result-pct {
    font-size: 14px;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    margin-bottom: 1rem;
  }

  .result-msg {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.7;
    max-width: 340px;
    margin: 0 auto 1.5rem;
  }

  .result-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 1.5rem;
  }

  .stat-card {
    background: var(--surface2);
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }

  .stat-val {
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    font-weight: 400;
    margin-bottom: 2px;
  }

  .stat-label {
    font-size: 11px;
    color: var(--text-dim);
  }

  .stat-val.green { color: var(--green); }
  .stat-val.red { color: var(--red); }
  .stat-val.accent { color: var(--accent); }

  .restart-btn {
    background: transparent;
    border: 1px solid var(--border-hover);
    border-radius: 10px;
    padding: 11px 28px;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s ease;
    width: 100%;
  }

  .restart-btn:hover {
    border-color: var(--accent-border);
    color: var(--accent);
    background: var(--accent-dim);
  }

  /* Review list */
  .review-section {
    margin-top: 1rem;
  }

  .review-title {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-family: 'DM Mono', monospace;
    margin-bottom: 10px;
  }

  .review-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 6px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 13px;
    line-height: 1.6;
  }

  .review-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    margin-top: 5px;
    flex-shrink: 0;
  }

  .review-dot.correct { background: var(--green); }
  .review-dot.wrong { background: var(--red); }

  .review-q { color: var(--text-muted); }

  @media (max-width: 480px) {
    .question-card { padding: 1.25rem; }
    .result-top { padding: 1.75rem 1.25rem 1.5rem; }
    .result-score { font-size: 42px; }
    .result-grid { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 2L13 5V11L8 14L3 11V5L8 2Z" stroke="#4f8ef7" stroke-width="1.2" fill="none"/>
          <circle cx="8" cy="8" r="1.5" fill="#4f8ef7"/>
        </svg>
      </div>
      <span class="logo-text">A-CDM Quiz</span>
    </div>
    <span class="date-tag" id="date-tag"></span>
  </div>

  <!-- Quiz screen -->
  <div id="quiz-screen">
    <div class="progress-wrap">
      <div class="progress-meta">
        <span class="progress-label">진행률</span>
        <span class="progress-count" id="prog-count">0 / 10</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="prog-bar" style="width:0%"></div>
      </div>
    </div>

    <div class="dots" id="dots"></div>

    <div id="question-area"></div>

    <div class="nav-row">
      <button class="nav-btn" id="prev-btn">← 이전</button>
      <span class="skip-info" id="skip-info"></span>
      <button class="nav-btn primary" id="next-btn">다음 →</button>
    </div>
  </div>

  <!-- Result screen -->
  <div class="result-screen" id="result-screen">
    <div class="result-top">
      <span class="result-emoji" id="result-emoji"></span>
      <div class="result-score-wrap">
        <span class="result-score" id="result-score"></span>
        <span class="result-denom" id="result-denom"></span>
      </div>
      <div class="result-pct" id="result-pct"></div>
      <p class="result-msg" id="result-msg"></p>
      <div class="result-grid">
        <div class="stat-card">
          <div class="stat-val green" id="stat-correct"></div>
          <div class="stat-label">정답</div>
        </div>
        <div class="stat-card">
          <div class="stat-val red" id="stat-wrong"></div>
          <div class="stat-label">오답</div>
        </div>
        <div class="stat-card">
          <div class="stat-val accent" id="stat-pct"></div>
          <div class="stat-label">정확도</div>
        </div>
      </div>
      <button class="restart-btn" id="restart-btn">↺ 다시 풀기</button>
    </div>

    <div class="review-section" id="review-section"></div>
  </div>
</div>

<script>
const QUESTIONS = [
  {
    q: "TOBT(목표 주기장 출발시간)의 정확도는 얼마로 관리되어야 하는가?",
    opts: ["±3분", "±5분", "±10분", "±15분"],
    ans: 1,
    exp: "TOBT의 정확도는 ±5분으로 관리되어야 합니다. 5분을 초과하는 차이가 발생할 경우 즉시 갱신해야 합니다."
  },
  {
    q: "A-CDM에서 TSAT이 파란색으로 표출된 이후, TOBT는 최대 몇 회까지 수정할 수 있는가?",
    opts: ["1회", "2회", "3회", "제한 없음"],
    ans: 2,
    exp: "관제탑 TSAT이 파란색으로 변경된 이후에는 TOBT를 3회까지만 수정할 수 있습니다. 3회 초과 시 기존 TOBT를 삭제하고 재입력해야 합니다."
  },
  {
    q: "조종사는 TOBT 기준 몇 분 이내에 관제탑에 비행허가를 요청해야 하는가?",
    opts: ["-5분 ~ +5분", "-10분 ~ +5분", "-15분 ~ +5분", "-10분 ~ +10분"],
    ans: 1,
    exp: "조종사는 TOBT 기준 -10분부터 +5분 이내에 관제탑에 비행허가를 요청해야 합니다."
  },
  {
    q: "DMAN(출발관리시스템)에서 산출된 TSAT은 TOBT 기준 몇 분 전에 제공되는가?",
    opts: ["TOBT-15분", "TOBT-30분", "TOBT-45분", "TOBT-60분"],
    ans: 1,
    exp: "DMAN에서 산출된 TSAT은 TOBT-30분 시점에 제공되며, A-CDM 시스템(포털/모바일 APP)에 파란색으로 표출됩니다."
  },
  {
    q: "수정된 TOBT가 EOBT와 얼마 이상 차이가 나면 EOBT를 수정해야 하는가?",
    opts: ["5분 이상", "10분 이상", "15분 이상", "30분 이상"],
    ans: 2,
    exp: "수정한 TOBT가 EOBT(예상 주기장 출발시간)와 15분 이상 차이가 발생할 경우, AFTN 지연 메시지 발송을 통해 EOBT를 수정해야 합니다."
  },
  {
    q: "인천공항 A-CDM 전체 마일스톤의 개수는?",
    opts: ["10개", "12개", "16개", "20개"],
    ans: 2,
    exp: "인천공항 A-CDM은 도착, 턴어라운드, 출발 과정에 걸쳐 총 16개의 마일스톤으로 구성됩니다."
  },
  {
    q: "CTOT(조정이륙시간)를 발부하는 기관은 어디인가?",
    opts: ["인천 관제탑", "계류장관제소", "항공교통통제센터(ATCC)", "인천국제공항공사"],
    ans: 2,
    exp: "CTOT는 항공교통통제센터(ATCC)에서 항로 수용량을 고려하여 공항 수용량을 조정하고 발부하는 이륙시간입니다."
  },
  {
    q: "시스템 TOBT(검은색)는 출발시간 사전발부(PDS)를 위한 어느 시스템에 적용되지 않는가?",
    opts: ["A-CDM 포털 시스템", "관제탑 출발관리시스템(DMAN)", "FIA 시스템", "모바일 APP"],
    ans: 1,
    exp: "운항스케줄에 따라 자동생성된 시스템 TOBT(검은색)는 출발시간 사전발부(PDS)를 위한 관제탑 출발관리시스템(DMAN)에 적용되지 않습니다. 초록색 TOBT만 DMAN에 적용됩니다."
  },
  {
    q: "TSAT+5분까지 계류장관제소에 푸시백을 요청하지 않으면 어떻게 되는가?",
    opts: ["TOBT만 취소됨", "TSAT만 취소됨", "ATC 허가와 TSAT 모두 취소됨", "운항 자체가 취소됨"],
    ans: 2,
    exp: "TSAT+5분까지 계류장관제소에 엔진시동 및 푸시백을 요청하지 않을 경우, 발부된 ATC 허가와 TSAT이 모두 취소됩니다."
  },
  {
    q: "A-CDM 2단계 운영 기간은 언제인가?",
    opts: ["2017.12 ~ 2025.09", "2025.09 ~ 2029.12", "2028.01 ~ 2032.12", "2030.01 ~"],
    ans: 1,
    exp: "A-CDM 2단계 운영은 2025년 9월부터 2029년 12월까지로, 출발관리시스템(DMAN) 고도화로 TTOT/TSAT 정보 개선과 제방빙 정보 공유 확대를 목표로 합니다."
  }
];

const LETTERS = ['A', 'B', 'C', 'D'];
const TOTAL = QUESTIONS.length;

let current = 0;
let answered = new Array(TOTAL).fill(null); // null | true | false
let score = 0;

function init() {
  current = 0;
  answered = new Array(TOTAL).fill(null);
  score = 0;
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('quiz-screen').style.display = '';
  updateDate();
  renderDots();
  renderQuestion();
}

function updateDate() {
  const d = new Date();
  const pad = n => String(n).padStart(2, '0');
  document.getElementById('date-tag').textContent =
    `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())}`;
}

function renderDots() {
  const container = document.getElementById('dots');
  container.innerHTML = '';
  answered.forEach((a, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot';
    if (a === true) dot.classList.add('correct');
    else if (a === false) dot.classList.add('wrong');
    else if (i === current) dot.classList.add('current');
    container.appendChild(dot);
  });
}

function renderProgress() {
  const done = answered.filter(a => a !== null).length;
  const pct = Math.round((done / TOTAL) * 100);
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('prog-count').textContent = `${done} / ${TOTAL}`;
}

function renderQuestion() {
  const q = QUESTIONS[current];
  const isAnswered = answered[current] !== null;
  const area = document.getElementById('question-area');

  area.innerHTML = `
    <div class="question-card">
      <div class="q-tag">문제 ${current + 1} / ${TOTAL}</div>
      <p class="q-text">${q.q}</p>
      <div class="options" id="opts"></div>
      <div class="feedback ${isAnswered ? 'show' : ''}" id="feedback">
        <div class="feedback-label">해설</div>
        ${q.exp}
      </div>
    </div>
  `;

  const opts = document.getElementById('opts');
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = `<span class="opt-letter">${LETTERS[i]}</span><span>${opt}</span>`;
    btn.disabled = isAnswered;
    if (isAnswered) {
      if (i === q.ans) btn.classList.add('correct');
      else if (answered[current] === false) btn.classList.add('wrong');
    }
    btn.addEventListener('click', () => selectAnswer(i));
    opts.appendChild(btn);
  });

  // Nav buttons
  const prevBtn = document.getElementById('prev-btn');
  const nextBtn = document.getElementById('next-btn');
  const skipInfo = document.getElementById('skip-info');

  prevBtn.disabled = current === 0;
  prevBtn.onclick = () => { current--; renderDots(); renderProgress(); renderQuestion(); };

  if (current === TOTAL - 1) {
    const allDone = answered.every(a => a !== null);
    nextBtn.textContent = '결과 보기 →';
    nextBtn.disabled = !allDone;
    skipInfo.textContent = allDone ? '' : '모든 문제를 풀어주세요';
  } else {
    nextBtn.textContent = '다음 →';
    nextBtn.disabled = false;
    skipInfo.textContent = answered[current] === null ? '건너뛰기 가능' : '';
  }

  nextBtn.onclick = () => {
    if (current === TOTAL - 1) {
      showResult();
    } else {
      current++;
      renderDots();
      renderProgress();
      renderQuestion();
    }
  };

  renderDots();
  renderProgress();
}

function selectAnswer(idx) {
  const q = QUESTIONS[current];
  const correct = idx === q.ans;
  answered[current] = correct;
  if (correct) score++;

  const opts = document.getElementById('opts').querySelectorAll('.opt-btn');
  opts.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.ans) btn.classList.add('correct');
    if (!correct && i === idx) btn.classList.add('wrong');
  });

  document.getElementById('feedback').classList.add('show');

  // Update last nav button
  if (current === TOTAL - 1) {
    const allDone = answered.every(a => a !== null);
    const nextBtn = document.getElementById('next-btn');
    nextBtn.disabled = !allDone;
    document.getElementById('skip-info').textContent = allDone ? '' : '모든 문제를 풀어주세요';
  }

  renderDots();
  renderProgress();
}

function showResult() {
  document.getElementById('quiz-screen').style.display = 'none';
  const rs = document.getElementById('result-screen');
  rs.classList.add('show');

  const pct = Math.round((score / TOTAL) * 100);
  const wrong = TOTAL - score;

  const emojis = ['😅', '🤔', '👍', '🎯', '🏆'];
  const emojiIdx = Math.min(Math.floor(pct / 20), 4);
  document.getElementById('result-emoji').textContent = emojis[emojiIdx];
  document.getElementById('result-score').textContent = score;
  document.getElementById('result-denom').textContent = ` / ${TOTAL}`;
  document.getElementById('result-pct').textContent = `정답률 ${pct}%`;

  const msgs = [
    'A-CDM 매뉴얼을 처음부터 다시 읽어보면 도움이 됩니다.',
    '기초는 잡혔어요. 조금 더 복습해봅시다.',
    '꽤 알고 있군요! 오답을 중심으로 보강해보세요.',
    '훌륭해요! 거의 전문가 수준입니다.',
    '완벽합니다! A-CDM 전문가시네요.'
  ];
  document.getElementById('result-msg').textContent = msgs[emojiIdx];
  document.getElementById('stat-correct').textContent = score;
  document.getElementById('stat-wrong').textContent = wrong;
  document.getElementById('stat-pct').textContent = pct + '%';

  // Review
  const rev = document.getElementById('review-section');
  const wrongItems = answered.map((a, i) => ({a, i})).filter(x => x.a === false);
  if (wrongItems.length > 0) {
    let html = `<div class="review-title">오답 목록 (${wrongItems.length}개)</div>`;
    wrongItems.forEach(({i}) => {
      const q = QUESTIONS[i];
      html += `
        <div class="review-item">
          <div class="review-dot wrong"></div>
          <div>
            <div class="review-q">${q.q}</div>
            <div style="font-size:12px;color:#4f8ef7;margin-top:4px;">정답: ${q.opts[q.ans]}</div>
          </div>
        </div>`;
    });
    rev.innerHTML = html;
  } else {
    rev.innerHTML = '';
  }

  document.getElementById('restart-btn').onclick = init;
}

init();
</script>
</body>
</html>
